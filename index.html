<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookmarklet Host</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f6f8fa;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .bookmarklet-btn {
            display: inline-block;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            background-color: #2da44e;
            border-radius: 6px;
            text-decoration: none;
            cursor: move; /* Shows the user it can be dragged */
            transition: background 0.2s;
        }
        .bookmarklet-btn:hover {
            background-color: #2c974b;
        }
        p {
            color: #57606a;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bookmarklet Loader</h1>
        <p>Drag the button below to your Bookmarks Bar:</p>
        
        <a class="bookmarklet-btn" 
           href="javascript:(function(){ alert('Bookmarklet loaded successfully!'); })();">
           Drag Me to Bookmarks
        </a>

        <p><small>Hint: Press <strong>Ctrl+Shift+B</strong> (or Cmd+Shift+B) if your bookmarks bar is hidden.</small></p>
    </div>

</body>
</html>
