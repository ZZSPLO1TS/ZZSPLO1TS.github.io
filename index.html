<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Site Not Found</title>
    <style>
        /* Stealth Styling */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: black; overflow: hidden; 
        }
        #view { 
            width: 100%; height: 100%; border: none; 
            display: none; background: white; 
        }
    </style>
</head>
<body>
    <iframe id="view"></iframe>

    <script>
        // Register the "Engine" (Service Worker)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./worker.js');
        }

        function loadSecret() {
            const hash = window.location.hash.substring(1);
            const frame = document.getElementById('view');
            
            if (hash) {
                // Public bridge to bypass simple blocks
                const bridge = "https://api.allorigins.win/raw?url=";
                frame.src = bridge + encodeURIComponent(hash);
                frame.style.display = "block";
            } else {
                frame.style.display = "none";
                frame.src = "";
            }
        }

        // Panic Key: Press 'Escape' to instantly flip back to Black Screen
        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") {
                window.location.hash = "";
                location.reload(); // Hard reset to black
            }
        });

        window.addEventListener('load', loadSecret);
        window.addEventListener('hashchange', loadSecret);
    </script>
</body>
</html>
