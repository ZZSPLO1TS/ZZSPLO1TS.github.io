<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tele-Private Friends</title>
    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; height: 100%; background: #e6ebee; overflow: hidden; }
        
        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: #517da2; display: flex; justify-content: center; align-items: center; z-index: 3000; }
        .auth-box { background: white; padding: 30px; border-radius: 15px; width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px 20px; background: #517da2; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* App Layout */
        #app { display: none; height: 100vh; flex-direction: row; }

        /* Sidebar */
        .sidebar { width: 280px; background: white; border-right: 1px solid #dfe5e9; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: #517da2; color: white; display: flex; justify-content: space-between; }
        .friend-list { flex-grow: 1; overflow-y: auto; }
        .friend-item { padding: 12px; border-bottom: 1px solid #f0f0f0; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .friend-item:hover, .friend-item.active { background: #f0f7ff; }
        .avatar-sm { width: 35px; height: 35px; background: #ccc; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; }

        /* Chat Area */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #cad3d8; }
        .chat-header { padding: 10px 20px; background: white; border-bottom: 1px solid #ddd; font-weight: bold; }
        .message-log { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }

        /* Message & Reply UI */
        .msg { max-width: 70%; padding: 10px; border-radius: 12px; font-size: 14px; position: relative; cursor: pointer; }
        .outgoing { background: #effdde; align-self: flex-end; }
        .incoming { background: white; align-self: flex-start; }
        .reply-preview { font-size: 11px; background: rgba(0,0,0,0.05); padding: 5px; border-left: 3px solid #517da2; margin-bottom: 5px; border-radius: 4px; color: #555; }
        
        /* Reply Bar (Above Input) */
        #reply-bar { display: none; background: #f9f9f9; padding: 8px 15px; border-top: 1px solid #ddd; font-size: 12px; justify-content: space-between; align-items: center; }

        .input-area { padding: 15px; background: white; display: flex; gap: 10px; }
        #msg-input { flex-grow: 1; border-radius: 20px; border: 1px solid #ddd; padding: 10px 15px; }

        /* Modals */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 4000; justify-content: center; align-items: center; }
        .modal { background: white; padding: 25px; border-radius: 15px; width: 280px; text-align: center; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h2 style="color:#517da2">TeleClone</h2>
        <input type="text" id="reg-username" placeholder="Username">
        <input type="password" id="reg-password" placeholder="Password">
        <button onclick="handleAuth()">LOGIN</button>
    </div>
</div>

<div id="app">
    <aside class="sidebar">
        <header class="sidebar-header">
            <span>Chats</span>
            <button onclick="showAddFriend()" style="background:none; color:white; font-size:18px;">+</button>
        </header>
        <div class="friend-list" id="friend-list">
            </div>
        <div style="padding:10px; font-size:11px; color:#999; text-align:center;">Double-click message to reply</div>
    </aside>

    <main class="chat-area">
        <header class="chat-header" id="active-chat-title">Select a friend to start chatting</header>
        
        <div class="message-log" id="msg-log"></div>

        <div id="reply-bar">
            <span id="reply-text">Replying to...</span>
            <button onclick="cancelReply()" style="background:none; border:none; color:red; cursor:pointer;">×</button>
        </div>

        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Message..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">SEND</button>
        </div>
    </main>
</div>

<div id="friend-modal" class="overlay">
    <div class="modal">
        <h3>Add Friend</h3>
        <input type="text" id="friend-name-input" placeholder="Enter Username...">
        <button onclick="addFriend()">ADD</button>
        <button onclick="closeModals()" style="background:#999">CANCEL</button>
    </div>
</div>

<script>
    let currentUser = "";
    let activeFriend = "";
    let replyTo = null;

    // --- AUTH ---
    function handleAuth() {
        const u = document.getElementById('reg-username').value.trim();
        if(!u) return;
        currentUser = u;
        localStorage.setItem('tele_user', u);
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        loadFriends();
    }

    // --- FRIEND SYSTEM ---
    function showAddFriend() { document.getElementById('friend-modal').style.display = 'flex'; }
    function closeModals() { document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none'); }

    function addFriend() {
        const name = document.getElementById('friend-name-input').value.trim();
        if(!name || name === currentUser) return alert("Invalid name");
        
        let friends = JSON.parse(localStorage.getItem(currentUser + '_friends') || '[]');
        if(!friends.includes(name)) friends.push(name);
        
        localStorage.setItem(currentUser + '_friends', JSON.stringify(friends));
        document.getElementById('friend-name-input').value = "";
        closeModals();
        loadFriends();
    }

    function loadFriends() {
        const list = document.getElementById('friend-list');
        list.innerHTML = "";
        const friends = JSON.parse(localStorage.getItem(currentUser + '_friends') || '[]');
        friends.forEach(f => {
            const div = document.createElement('div');
            div.className = `friend-item ${f === activeFriend ? 'active' : ''}`;
            div.innerHTML = `<div class="avatar-sm">${f[0].toUpperCase()}</div> <span>${f}</span>`;
            div.onclick = () => selectFriend(f);
            list.appendChild(div);
        });
    }

    function selectFriend(name) {
        activeFriend = name;
        document.getElementById('active-chat-title').innerText = `Chat with ${name}`;
        loadFriends(); // Refresh active class
        loadMessages();
    }

    // --- CHAT & REPLY ---
    function send() {
        if(!activeFriend) return alert("Select a friend first!");
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if(!text) return;

        const msg = {
            sender: currentUser,
            text: text,
            replyTo: replyTo, // Attach the text we are replying to
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        const key = `chat_${currentUser}_${activeFriend}`;
        const history = JSON.parse(localStorage.getItem(key) || '[]');
        history.push(msg);
        localStorage.setItem(key, JSON.stringify(history));
        
        cancelReply();
        input.value = "";
        loadMessages();
    }

    function loadMessages() {
        const log = document.getElementById('msg-log');
        log.innerHTML = "";
        const key = `chat_${currentUser}_${activeFriend}`;
        const history = JSON.parse(localStorage.getItem(key) || '[]');

        history.forEach(m => {
            const div = document.createElement('div');
            div.className = `msg ${m.sender === currentUser ? 'outgoing' : 'incoming'}`;
            div.ondblclick = () => setReply(m.text);
            
            let replyHTML = m.replyTo ? `<div class="reply-preview">Replying to: "${m.replyTo}"</div>` : "";
            div.innerHTML = `${replyHTML}${m.text} <span style="font-size:9px; color:#999; margin-left:10px;">${m.time}</span>`;
            log.appendChild(div);
        });
        log.scrollTop = log.scrollHeight;
    }

    function setReply(text) {
        replyTo = text;
        document.getElementById('reply-bar').style.display = 'flex';
        document.getElementById('reply-text').innerText = `Replying to: "${text.substring(0, 20)}..."`;
        document.getElementById('msg-input').focus();
    }

    function cancelReply() {
        replyTo = null;
        document.getElementById('reply-bar').style.display = 'none';
    }

    // Load session if exists
    window.onload = () => {
        const saved = localStorage.getItem('tele_user');
        if(saved) {
            currentUser = saved;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            loadFriends();
        }
    };
</script>
</body>
</html>
