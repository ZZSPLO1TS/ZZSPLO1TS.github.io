<!DOCTYPE html>
<html>
<head>
    <title>Talk.ative | Social</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --accent: #58a6ff; --text: #c9d1d9; --dim: #8b949e; --border: #30363d; --card: #21262d; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        
        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 12px; border: 1px solid var(--border); width: 320px; text-align: center; }
        .logo { font-size: 2.2em; font-weight: 800; color: var(--accent); margin-bottom: 10px; letter-spacing: -1px; }
        .logo span { color: #fff; }

        /* LAYOUT */
        #app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; width: 100vw; }
        
        /* SIDEBAR (Independent Scroll) */
        #sidebar { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
        .sidebar-content { padding: 15px; flex: 1; }
        
        /* MAIN VIEW */
        #main-view { display: flex; flex-direction: column; background: var(--bg); position: relative; overflow: hidden; }
        
        /* SCROLLABLE CONTENT */
        #content { flex: 1; overflow-y: scroll; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        /* POSTS */
        .post { background: var(--panel); padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); }
        .pfp { width: 32px; height: 32px; border-radius: 50%; background: #333; float: left; margin-right: 10px; object-fit: cover; }
        .author { color: var(--accent); font-weight: 600; cursor: pointer; font-size: 0.9em; }
        
        /* ACCOUNT MODAL */
        #account-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; }
        .modal-box { background: var(--panel); padding: 25px; border-radius: 12px; width: 300px; border: 1px solid var(--border); }

        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid var(--border); background: #000; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border-radius: 6px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
        
        .sidebar-item { padding: 10px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; font-size: 0.9em; }
        .sidebar-item:hover { background: var(--card); }
        .sidebar-item.active { background: #1f6feb; color: white; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <div class="logo">Talk<span>.ative</span></div>
        <input type="text" id="login-user" placeholder="Username">
        <button onclick="doLogin()">Enter</button>
    </div>
</div>

<div id="account-modal">
    <div class="modal-box">
        <h3>Account Settings</h3>
        <input type="text" id="set-pfp" placeholder="PFP Image URL">
        <textarea id="set-bio" placeholder="Write a short bio..."></textarea>
        <button onclick="saveAccount()">Save & Close</button>
    </div>
</div>

<div id="app" style="display:none">
    <div id="sidebar">
        <div class="sidebar-content">
            <div class="logo" style="font-size: 1.5em; margin-bottom: 20px;">Talk<span>.ative</span></div>
            <div class="sidebar-item active" onclick="loadRoom('global_v5', this)">🌐 Global Square</div>
            <div class="sidebar-item" onclick="document.getElementById('account-modal').style.display='flex'">⚙️ Settings</div>
            
            <div style="margin: 20px 0 10px 0; font-size: 0.7em; color: var(--dim); font-weight: bold; letter-spacing: 1px;">DIRECT MESSAGES</div>
            <div id="friends-list"></div>
        </div>
    </div>

    <div id="main-view">
        <div id="content"></div>
        <div style="padding: 15px 20px; background: var(--panel); border-top: 1px solid var(--border); display: flex; gap: 10px;">
            <input type="text" id="msg-input" placeholder="Type a message..." style="margin:0">
            <button onclick="sendData()" style="width:80px; margin:0">SEND</button>
        </div>
    </div>
</div>

<script>
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
    let currentUser = localStorage.getItem('talkative_user');
    let currentRoom = 'global_v5';

    // 1. AUTH & ACCOUNT
    if(currentUser) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').style.display = 'grid';
        loadRoom(currentRoom);
    }

    function doLogin() {
        const u = document.getElementById('login-user').value.trim().toLowerCase();
        if(u.length < 2) return alert("Too short");
        localStorage.setItem('talkative_user', u);
        location.reload();
    }

    function saveAccount() {
        const pfp = document.getElementById('set-pfp').value;
        const bio = document.getElementById('set-bio').value;
        gun.get('user_profiles').get(currentUser).put({ pfp, bio });
        document.getElementById('account-modal').style.display = 'none';
    }

    // 2. MESSAGING
    function loadRoom(targetRoom, el) {
        currentRoom = targetRoom;
        const container = document.getElementById('content');
        container.innerHTML = '';
        
        if(el) {
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        gun.get(currentRoom).map().once((data, id) => {
            if(!data || !data.text) return;
            
            const post = document.createElement('div');
            post.className = 'post';
            
            // Fetch author profile data
            gun.get('user_profiles').get(data.user).once(prof => {
                const pfpImg = prof && prof.pfp ? prof.pfp : 'https://api.dicebear.com/7.x/identicon/svg?seed=' + data.user;
                post.innerHTML = `
                    <img src="${pfpImg}" class="pfp">
                    <div class="author" onclick="openDM('${data.user}')">@${data.user}</div>
                    <div style="margin-top:4px; font-size:0.95em;">${data.text}</div>
                `;
            });

            container.appendChild(post);
            container.scrollTop = container.scrollHeight;
        });
    }

    function sendData() {
        const input = document.getElementById('msg-input');
        if(!input.value) return;
        gun.get(currentRoom).set({
            user: currentUser,
            text: input.value,
            time: Date.now()
        });
        input.value = '';
    }

    // 3. DM LOGIC
    function openDM(target) {
        if(target === currentUser) return;
        const roomID = [currentUser, target].sort().join('_dm_v2_');
        
        if(!document.getElementById('dm-'+target)) {
            const div = document.createElement('div');
            div.id = 'dm-'+target;
            div.className = 'sidebar-item';
            div.innerHTML = `💬 @${target}`;
            div.onclick = () => loadRoom(roomID, div);
            document.getElementById('friends-list').appendChild(div);
            loadRoom(roomID, div);
        } else {
            loadRoom(roomID, document.getElementById('dm-'+target));
        }
    }

    document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendData(); };
</script>

</body>
</html>
